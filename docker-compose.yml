services:

  app:
    image: Kinematics-Simulator-API

    build:
      context: .
      dockerfile: Kinematics-Simulator.API\Dockerfile

    ports:
      - "8080:8080"
      - "8081:8081"

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${SQL_CONNECTION_STRING}

    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2025-latest

    ports:
      - "1433:1433"

    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}

    volumes:
      - sql_data:/var/opt/mssql
